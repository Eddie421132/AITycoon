<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 创世代 (AI Tycoon)</title>
    
    <!-- 引入 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 引入 Babel 编译器 (用于在浏览器中运行 JSX 代码) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 FontAwesome 图标库 (替代 Lucide 图标) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 自定义文本选中颜色 */
        ::selection { background-color: #22c55e; color: white; }
        body { margin: 0; padding: 0; background-color: #030712; } /* 对应 gray-950 */
    </style>
</head>
<body class="bg-gray-950 text-gray-200 font-sans">
    
    <!-- 游戏的根节点 -->
    <div id="root"></div>

    <!-- 游戏主逻辑代码 -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 【安全警告】这里填入你的 API Key 才能聊天画图。不要发给别人看哦！
        const API_KEY = "AIzaSyBAexJiitCVLCC8_PFYU7TLm0UXlmalTk4";

        // --- 图标组件映射 (把 FontAwesome 封装成类似原先组件的用法) ---
        const Terminal = ({className}) => <i className={`fas fa-terminal ${className}`}></i>;
        const Cpu = ({className}) => <i className={`fas fa-microchip ${className}`}></i>;
        const Zap = ({className}) => <i className={`fas fa-bolt ${className}`}></i>;
        const ImageIcon = ({className}) => <i className={`fas fa-image ${className}`}></i>;
        const MessageSquare = ({className}) => <i className={`fas fa-comment-dots ${className}`}></i>;
        const Activity = ({className}) => <i className={`fas fa-chart-line ${className}`}></i>;
        const DollarSign = ({className}) => <i className={`fas fa-dollar-sign ${className}`}></i>;
        const Database = ({className}) => <i className={`fas fa-database ${className}`}></i>;
        const Power = ({className}) => <i className={`fas fa-power-off ${className}`}></i>;
        const Skull = ({className}) => <i className={`fas fa-skull-crossbones ${className}`}></i>;
        const Lock = ({className}) => <i className={`fas fa-lock ${className}`}></i>;
        const X = ({className}) => <i className={`fas fa-times ${className}`}></i>;
        const Play = ({className}) => <i className={`fas fa-play ${className}`}></i>;
        const Globe = ({className}) => <i className={`fas fa-globe ${className}`}></i>;
        const Shield = ({className}) => <i className={`fas fa-shield-alt ${className}`}></i>;
        const Route = ({className}) => <i className={`fas fa-network-wired ${className}`}></i>;
        const BookOpen = ({className}) => <i className={`fas fa-book-open ${className}`}></i>;
        const CheckCircle = ({className}) => <i className={`fas fa-check-circle ${className}`}></i>;
        const AlertTriangle = ({className}) => <i className={`fas fa-exclamation-triangle ${className}`}></i>;
        const LogOut = ({className}) => <i className={`fas fa-sign-out-alt ${className}`}></i>;

        function App() {
            // Game State
            const [money, setMoney] = useState(500); 
            const [gpus, setGpus] = useState(1);
            const [gpuCost, setGpuCost] = useState(150);
            const [elecBill, setElecBill] = useState(0);
            
            // AI State
            const [aiLevel, setAiLevel] = useState(1);
            const [aiExp, setAiExp] = useState(0);
            const [isTraining, setIsTraining] = useState(false);
            const [powerOutage, setPowerOutage] = useState(false);
            
            // UI State
            const [logs, setLogs] = useState(["[系统] 公司成立。初始资金 $500。渗透测试模块全面升级！"]);
            const [activeTab, setActiveTab] = useState('network'); 
            
            // Chat & Image State
            const [chatHistory, setChatHistory] = useState([{ role: 'model', text: '阿巴阿巴...我...我是你的AI...请问有什么吩咐？' }]);
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);
            const [imagePrompt, setImagePrompt] = useState('');
            const [generatedImage, setGeneratedImage] = useState(null);
            const [isGeneratingImg, setIsGeneratingImg] = useState(false);

            // --- HACKING STATE (Multi-Stage & Push Your Luck) ---
            const [showTutorial, setShowTutorial] = useState(true);
            const [activeNode, setActiveNode] = useState(null);
            
            // hackPhase: 'idle', 'config', 'ddos', 'bruteforce', 'connecting', 'downloading', 'result'
            const [hackPhase, setHackPhase] = useState('idle'); 
            const [remainingDefenses, setRemainingDefenses] = useState([]); 
            const [moduleProgress, setModuleProgress] = useState(0); 
            
            const [terminalLines, setTerminalLines] = useState([]);
            const terminalEndRef = useRef(null);
            
            const [hackConfig, setHackConfig] = useState({ rhost: '', lhost: '192.168.1.104', payload: '', exploitFile: 'payload_v4.rb' });
            const [stolenMoney, setStolenMoney] = useState(0);
            const [traceProgress, setTraceProgress] = useState(0);
            const [hackCooldowns, setHackCooldowns] = useState({});

            // --- NETWORK NODES ---
            const nodes = [
                { id: 1, name: "竞争对手服务器", x: 20, y: 30, riskMulti: 1.0, rewardBase: 10, reqLvl: 1, defense: 'none', desc: "毫无防备。直接使用 exploit 攻击即可。" },
                { id: 2, name: "外包数据中心", x: 50, y: 20, riskMulti: 2.0, rewardBase: 30, reqLvl: 2, defense: 'firewall', desc: "有防火墙保护。需要先使用 brute_force 爆破密码。" },
                { id: 3, name: "跨国企业分部", x: 80, y: 40, riskMulti: 3.5, rewardBase: 60, reqLvl: 3, defense: 'proxy', desc: "隐藏在代理后。需要先用 synflood DDoS瘫痪代理。" },
                { id: 4, name: "加密货币交易所", x: 30, y: 70, riskMulti: 5.0, rewardBase: 150, reqLvl: 4, defense: 'both', desc: "双重防御。先 DDoS代理，再 爆破防火墙，最后 攻击主服务器。" },
                { id: 5, name: "联邦核心金库", x: 70, y: 80, riskMulti: 8.0, rewardBase: 500, reqLvl: 5, defense: 'both', desc: "终极目标！安保极严，追踪极快，不要太贪心！" },
            ];

            // --- GAME LOOP ---
            useEffect(() => {
                const tick = setInterval(() => {
                if (powerOutage) return;
                let elecCost = 0;
                let expGain = 0;

                if (isTraining) {
                    elecCost = gpus * 0.3; 
                    expGain = gpus * 2; 
                }

                if (elecCost > 0) {
                    setElecBill(prev => {
                    const newBill = prev + elecCost;
                    if (newBill >= 500) {
                        setPowerOutage(true);
                        setIsTraining(false);
                        addLog("[警告] 欠费超过 $500！已被断电！", "error");
                    }
                    return newBill;
                    });
                }

                if (isTraining) {
                    setAiExp(prev => {
                    const nextVal = prev + expGain;
                    const expNeeded = aiLevel * 100;
                    if (nextVal >= expNeeded) {
                        levelUp(aiLevel + 1);
                        return nextVal - expNeeded;
                    }
                    return nextVal;
                    });
                }
                }, 1000);
                return () => clearInterval(tick);
            }, [gpus, isTraining, powerOutage, aiLevel]);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chatHistory, isTyping]);
            useEffect(() => { terminalEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [terminalLines]);

            const levelUp = (newLevel) => {
                setAiLevel(newLevel);
                addLog(`[升级] 你的模型进化到了 Level ${newLevel}!`);
                if (newLevel === 4) addLog(`[解锁] 图像生成能力已解锁！`, "success");
                if (newLevel === 5) addLog(`[突破] 核心架构升级为完全体！`, "success");
            };

            const addLog = (msg, type = "info") => {
                setLogs(prev => [...prev.slice(-15), { msg, type, time: new Date().toLocaleTimeString() }]);
            };

            const pushTerminal = (msg, color = 'text-green-400') => {
                setTerminalLines(prev => [...prev, { msg, color }]);
            };

            // --- ACTIONS ---
            const buyGpu = () => {
                if (money >= gpuCost) {
                setMoney(prev => prev - gpuCost);
                setGpus(prev => prev + 1);
                setGpuCost(prev => Math.floor(prev * 1.4)); 
                addLog(`[采购] 购买 GPU。总算力: ${gpus + 1}`);
                } else {
                addLog(`[失败] 资金不足。`, "error");
                }
            };

            const payBill = () => {
                if (money >= elecBill) {
                setMoney(prev => prev - elecBill);
                setElecBill(0);
                setPowerOutage(false);
                addLog(`[财务] 成功缴纳电费。`);
                } else if (money > 0 && elecBill > 0) {
                setElecBill(prev => prev - money);
                setMoney(0);
                addLog(`[财务] 缴纳了部分电费。`, "warning");
                }
            };

            const toggleTraining = () => {
                if (powerOutage) return;
                setIsTraining(!isTraining);
                addLog(isTraining ? `[系统] 停止训练。` : `[系统] 启动训练，耗电增加。`);
            };

            // --- HACKING CORE LOGIC ---
            const logCurrentRequirement = (req) => {
                if (req === 'proxy') {
                    pushTerminal(`[!] 目标隐藏在代理服务器之后。`, 'text-yellow-400 font-bold');
                    pushTerminal(`[*] 指令: 需要手动选择 synflood 模块发起 DDoS 攻击使其过载。`, 'text-yellow-400');
                } else if (req === 'firewall') {
                    pushTerminal(`[!] 目标主节点被硬件防火墙锁定。`, 'text-orange-400 font-bold');
                    pushTerminal(`[*] 指令: 需要手动选择 brute_force 模块暴力破解其 Root 密码。`, 'text-orange-400');
                } else {
                    pushTerminal(`[+] 前置防御已全部清除。主服务器暴露。`, 'text-blue-400 font-bold');
                    pushTerminal(`[*] 指令: 请选择 neural_override 模块建立后门开始窃取。`, 'text-blue-400');
                }
            };

            const startHack = (node) => {
                if (powerOutage) return addLog("停电中！", "error");
                if (aiLevel < node.reqLvl) return addLog(`AI等级不足，需要Lv.${node.reqLvl}`, "error");
                if (hackCooldowns[node.id]) return addLog(`节点警觉中，冷却中...`, "warning");

                setActiveNode(node);
                setTerminalLines([]);
                setStolenMoney(0);
                setTraceProgress(0);
                setModuleProgress(0);
                
                const randomIp = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
                setHackConfig(prev => ({ ...prev, rhost: randomIp, payload: '' }));
                
                let defs = [];
                if (node.defense === 'proxy') defs = ['proxy'];
                else if (node.defense === 'firewall') defs = ['firewall'];
                else if (node.defense === 'both') defs = ['proxy', 'firewall'];
                
                setRemainingDefenses(defs);
                setHackPhase('config');
                
                pushTerminal(`[*] 锁定目标节点: ${node.name}`);
                logCurrentRequirement(defs[0]);
            };

            const executeModule = () => {
                if (!hackConfig.payload) {
                    pushTerminal(`[-] 错误: 请先在下拉菜单中选择一个 PAYLOAD 模块！`, 'text-red-500');
                    return;
                }

                const currentReq = remainingDefenses[0];

                if (currentReq === 'proxy') {
                    if (hackConfig.payload !== 'auxiliary/dos/tcp/synflood') {
                        pushTerminal(`[-] 模块选择错误: 遭遇代理拦截！需要选择辅助 DDoS 模块 (synflood) 瘫痪代理。`, 'text-red-500 font-bold');
                        return;
                    }
                    setModuleProgress(0);
                    setHackPhase('ddos');
                    pushTerminal(`msf5 > use ${hackConfig.payload}`, 'text-yellow-400');
                    pushTerminal(`[*] 启动洪水攻击发生器...目标: ${hackConfig.rhost}`);
                } 
                else if (currentReq === 'firewall') {
                    if (hackConfig.payload !== 'auxiliary/scanner/ssh/brute_force') {
                        pushTerminal(`[-] 模块选择错误: 遭遇防火墙拦截！需要选择暴力破解模块 (brute_force) 猜解密码。`, 'text-red-500 font-bold');
                        return;
                    }
                    setModuleProgress(0);
                    setHackPhase('bruteforce');
                    pushTerminal(`msf5 > use ${hackConfig.payload}`, 'text-yellow-400');
                    pushTerminal(`[*] 加载顶级密码字典库...目标: ${hackConfig.rhost}:22`);
                } 
                else {
                    if (hackConfig.payload !== 'exploit/ai/neural_override') {
                        pushTerminal(`[-] 模块选择错误: 道路已扫清，现在必须使用漏洞利用模块 (neural_override) 建立连接！`, 'text-red-500 font-bold');
                        return;
                    }
                    executeMainExploit();
                }
            };

            // Pre-attack Animations
            useEffect(() => {
                let interval;
                if (hackPhase === 'ddos') {
                    interval = setInterval(() => {
                        setModuleProgress(p => {
                            const next = p + Math.random() * 8 + 2;
                            if (Math.random() > 0.4) {
                                pushTerminal(`[*] TCP SYN Flooding -> ${hackConfig.rhost}:${Math.floor(Math.random()*65535)}  [84 bytes]`, 'text-gray-500');
                            }
                            if (next >= 100) {
                                clearInterval(interval);
                                pushTerminal(`[+] 代理服务器负载达到极限，核心服务已宕机！网络真实拓扑暴露！`, 'text-green-400 font-bold');
                                setTimeout(() => {
                                    const nextDefs = remainingDefenses.slice(1);
                                    setRemainingDefenses(nextDefs);
                                    setHackConfig(prev => ({...prev, payload: ''}));
                                    setHackPhase('config');
                                    logCurrentRequirement(nextDefs[0]);
                                }, 2000);
                                return 100;
                            }
                            return next;
                        });
                    }, 150);
                } else if (hackPhase === 'bruteforce') {
                    const commonPasswords = ['123456', 'password', 'admin', 'root', 'qwerty', 'iloveyou', 'test', 'system'];
                    interval = setInterval(() => {
                        setModuleProgress(p => {
                            const next = p + Math.random() * 5 + 1;
                            if (Math.random() > 0.3) {
                                const fakePass = `${commonPasswords[Math.floor(Math.random()*commonPasswords.length)]}${Math.floor(Math.random()*999)}`;
                                pushTerminal(`[-] 尝试 SSH 登录 root:${fakePass} ... 认证失败`, 'text-yellow-600');
                            }
                            if (next >= 100) {
                                clearInterval(interval);
                                pushTerminal(`[+] 暴力破解成功！提取到管理员凭证: root:admin_pwned_99`, 'text-green-400 font-bold');
                                setTimeout(() => {
                                    const nextDefs = remainingDefenses.slice(1);
                                    setRemainingDefenses(nextDefs);
                                    setHackConfig(prev => ({...prev, payload: ''}));
                                    setHackPhase('config');
                                    logCurrentRequirement(nextDefs[0]);
                                }, 2500);
                                return 100;
                            }
                            return next;
                        });
                    }, 200);
                }
                return () => clearInterval(interval);
            }, [hackPhase, remainingDefenses]);

            const executeMainExploit = () => {
                setHackPhase('connecting');
                pushTerminal(`msf5 > use exploit/${hackConfig.payload}`, 'text-yellow-400');
                setTimeout(() => pushTerminal(`[*] RHOST => ${hackConfig.rhost}`), 300);
                setTimeout(() => pushTerminal(`[*] LHOST => ${hackConfig.lhost}`), 600);
                setTimeout(() => pushTerminal(`[*] 加载独立脚本 => /payloads/${hackConfig.exploitFile}`), 900);
                setTimeout(() => pushTerminal(`msf5 exploit > exploit`, 'text-yellow-400'), 1400);
                setTimeout(() => pushTerminal(`[*] 正在向目标发送 payload...`), 2000);
                
                setTimeout(() => {
                    pushTerminal(`[+] Meterpreter session 1 opened!`, 'text-green-400 font-bold');
                    pushTerminal(`[!] 警告：触发核心金库安全警报，追踪程序已启动！`, 'text-red-500 animate-pulse font-bold');
                    pushTerminal(`[*] 建立隐蔽数据隧道，开始窃取资金...`, 'text-blue-400');
                    setHackPhase('downloading');
                }, 3500);
            };

            useEffect(() => {
                let interval;
                if (hackPhase === 'downloading' && activeNode) {
                    interval = setInterval(() => {
                        const gain = Math.floor(activeNode.rewardBase * (0.8 + Math.random() * 0.4));
                        setStolenMoney(prev => prev + gain);
                        
                        if (Math.random() > 0.5) {
                            pushTerminal(`[+] 截获加密封包，解析出资金 $${gain}`, 'text-green-400');
                        }

                        setTraceProgress(prev => {
                            const traceSpike = (Math.random() * 3 + 1) * activeNode.riskMulti;
                            const nextProgress = prev + traceSpike;
                            if (nextProgress >= 100) {
                                clearInterval(interval);
                                handleBust();
                            }
                            return nextProgress;
                        });
                    }, 1000); 
                }
                return () => clearInterval(interval);
            }, [hackPhase, activeNode]);

            const abortAndCashOut = () => {
                setHackPhase('result');
                pushTerminal(`[*] 正在擦除日志并主动切断连接...`, 'text-yellow-400');
                setTimeout(() => {
                    setMoney(prev => prev + stolenMoney);
                    pushTerminal(`[+] 安全撤离！本次行动共获利: $${stolenMoney}`, 'text-green-400 font-bold');
                    addLog(`成功窃取 ${activeNode.name}，获利 $${stolenMoney}`, "success");
                    setNodeCooldown(activeNode.id);
                }, 1000);
            };

            const handleBust = () => {
                setHackPhase('result');
                pushTerminal(`[-] FATAL: The connection was reset by peer.`, 'text-red-500 font-bold');
                pushTerminal(`[!] 安全局已锁定您的物理位置！被当场抓获！`, 'text-red-500 font-bold animate-pulse');
                
                const penalty = Math.floor(activeNode.rewardBase * 10 * activeNode.riskMulti); 
                setMoney(prev => Math.max(0, prev - penalty));
                
                pushTerminal(`[-] 账户被查封，遭到反制罚款: -$${penalty}`, 'text-red-500');
                addLog(`入侵 ${activeNode.name} 被抓捕！被罚款 $${penalty}`, "error");
                setNodeCooldown(activeNode.id);
            };

            const setNodeCooldown = (id) => {
                setHackCooldowns(prev => ({ ...prev, [id]: true }));
                setTimeout(() => {
                    setHackCooldowns(prev => ({ ...prev, [id]: false }));
                }, 20000);
            };

            const closeHackModal = () => {
                setActiveNode(null);
                setHackPhase('idle');
            };

            // --- AI API ---
            const handleChatSubmit = async (e) => {
                e.preventDefault();
                if (!chatInput.trim() || isTyping || powerOutage) return;
                setElecBill(prev => prev + 0.1); 
                const userMsg = chatInput;
                setChatInput('');
                setChatHistory(prev => [...prev, { role: 'user', text: userMsg }]);
                setIsTyping(true);
                const baseDelay = Math.max(500, 3000 - (gpus * 200)); 
                
                setTimeout(async () => {
                try {
                    let systemPrompt = aiLevel <= 2 ? "你现在是一个初创公司刚开发出来的非常笨的早期AI模型。你经常犯错，说话结巴，只能用简短、困惑的语气回答。必须用中文。" 
                                    : aiLevel <= 4 ? "你是一个由玩家开发的普通水平的AI助手。你可以正常用中文回答问题。" 
                                    : "你是一个极其聪明、无所不知的高级AI模型，代号Gemini 3 Pro。请提供专业极具洞察力的中文回答。";
                    const payload = { contents: [{ parts: [{ text: userMsg }] }], systemInstruction: { parts: [{ text: systemPrompt }] } };
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const data = await response.json();
                    setChatHistory(prev => [...prev, { role: 'model', text: data.candidates?.[0]?.content?.parts?.[0]?.text || "出错了..." }]);
                } catch (error) {
                    setChatHistory(prev => [...prev, { role: 'model', text: "网络异常..." }]);
                } finally { setIsTyping(false); }
                }, baseDelay);
            };

            const handleImageGenerate = async (e) => {
                e.preventDefault();
                if (!imagePrompt.trim() || isGeneratingImg || powerOutage) return;
                setElecBill(prev => prev + 0.5); 
                setIsGeneratingImg(true);
                try {
                const payload = { contents: [{ parts: [{ text: imagePrompt }] }], generationConfig: { responseModalities: ['TEXT', 'IMAGE'] } };
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${API_KEY}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();
                const base64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                if (base64) setGeneratedImage(`data:image/png;base64,${base64}`);
                } catch (error) { addLog(`图像生成失败`, "error"); } 
                finally { setIsGeneratingImg(false); }
            };

            const ProgressBar = ({ current, max, color }) => (
                <div className="w-full bg-gray-700 rounded-full h-2.5 mt-1 overflow-hidden">
                <div className={`h-full rounded-full ${color} transition-all duration-300`} style={{ width: `${Math.min(100, (current / max) * 100)}%` }}></div>
                </div>
            );

            return (
                <div className="min-h-screen p-2 md:p-4 flex flex-col md:flex-row gap-4 selection:bg-green-500 selection:text-white relative">
                
                {/* --- HACKER MODAL --- */}
                {hackPhase !== 'idle' && (
                    <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-gray-900 border border-green-500/50 shadow-[0_0_30px_rgba(34,197,94,0.15)] rounded-lg w-full max-w-4xl overflow-hidden flex flex-col">
                        
                        {/* Header */}
                        <div className="bg-gray-800 border-b border-gray-700 p-3 flex justify-between items-center">
                        <div className="flex items-center gap-2 text-green-400 font-mono text-sm font-bold">
                            <Terminal className="w-4 h-4 mr-1" /> MSF_CONSOLE [行动代号: {activeNode?.name}]
                        </div>
                        <button onClick={closeHackModal} disabled={hackPhase === 'downloading' || hackPhase === 'ddos' || hackPhase === 'bruteforce'} className="text-gray-400 hover:text-white disabled:opacity-20">

                        ) : (
                        <div className="text-gray-500 flex flex-col items-center text-center p-4">
                            <ImageIcon className="w-12 h-12 mb-2 opacity-50 text-pink-500" />
                            <p className="text-sm">高级图像引擎就绪。<br/>输入提示词生成图像。</p>
                        </div>
                        )}
                    </div>

                    <form onSubmit={handleImageGenerate} className="flex gap-2 shrink-0">
                        <input type="text" value={imagePrompt} onChange={e => setImagePrompt(e.target.value)} placeholder="输入画面描述..." className="flex-1 bg-gray-800 text-white text-sm rounded-lg px-3 py-3 focus:outline-none focus:ring-1 focus:ring-pink-500 border border-gray-700" disabled={isGeneratingImg} />
                        <button type="submit" disabled={isGeneratingImg || !imagePrompt.trim()} className="bg-pink-600 hover:bg-pink-500 disabled:bg-gray-700 text-white px-4 rounded-lg font-bold">生成</button>
                    </form>
                    </div>
                    )}
                </div>
                </div>
            );
        }

        // 渲染 React 应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
